<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PyGlide | Premium Python IDE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --sidebar: #070708;
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.15);
            --border: rgba(255,255,255,0.08);
            --success: #10b981;
            --error: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --editor-bg: #0f0f11;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        .layout { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .toolbar { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(10px); }
        .editor-zone { flex: 1; position: relative; background: var(--editor-bg); display: flex; overflow: hidden; }
        
        .editor-container { position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .tabs-container { height: 40px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; padding: 0 10px; gap: 4px; overflow-x: auto; }
        .editor-tab { padding: 8px 16px; background: rgba(255,255,255,0.02); color: var(--text-dim); font-size: 12px; font-family: 'JetBrains Mono', monospace; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; display: flex; align-items: center; gap: 8px; }
        .editor-tab.active { background: var(--editor-bg); color: var(--accent); border-color: var(--border); font-weight: 600; border-top: 2px solid var(--accent); }
        .editor-tab:hover:not(.active) { background: rgba(255,255,255,0.05); color: var(--text); }
        .tab-close { font-size: 14px; opacity: 0.5; cursor: pointer; }
        .tab-close:hover { opacity: 1; color: var(--error); }
        
        #monaco-container { flex: 1; width: 100%; height: 100%; }
        
        .terminal { display: flex; flex-direction: column; border-top: 1px solid var(--border); background: #070708; z-index: 50; position: relative; }
        .terminal-resizer { width: 100%; height: 6px; cursor: row-resize; position: absolute; top: -3px; left: 0; z-index: 100; transition: background 0.2s; }
        .terminal-resizer:hover, .terminal-resizer:active { background: var(--accent); opacity: 0.8; }
        .terminal-header { font-size: 0.7rem; color: var(--text-dim); padding: 10px 20px; font-weight: 800; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }
        #xterm-container { flex: 1; overflow: hidden; background: #070708; }
        .xterm-viewport { overflow-y: auto !important; }
        
        /* ENHANCED RCA PANEL */
        .rca-panel { 
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 500px; /* Wider for better reading */
            max-width: 90%;
            background: rgba(10, 10, 12, 0.98); 
            border-left: 1px solid var(--border); 
            backdrop-filter: blur(40px); 
            padding: 2.5rem; 
            overflow-y: auto; 
            z-index: 100; 
            box-shadow: -30px 0 60px rgba(0,0,0,0.6); 
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: slideInRca 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideInRca {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        .rca-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
        .rca-title { font-size: 0.75rem; font-weight: 800; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }
        
        .diagnostic-card { 
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.08) 0%, rgba(59, 130, 246, 0.02) 100%); 
            border: 1px solid rgba(59, 130, 246, 0.2); 
            padding: 1.5rem; 
            border-radius: 12px; 
        }
        
        .diagnostic-section { margin-bottom: 1.25rem; }
        .diagnostic-section:last-child { margin-bottom: 0; }
        .diagnostic-label { font-size: 0.65rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .diagnostic-text { font-size: 0.9rem; line-height: 1.6; color: #e2e8f0; font-weight: 400; }
        
        /* GRAPH-BASED RCA STYLES */
        .graph-container { position: relative; padding: 10px 0 20px 30px; }
        .graph-node { position: relative; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 1.25rem; border-radius: 12px; margin-bottom: 2.5rem; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .graph-node.root { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.05); }
        .graph-node.exception { border-color: rgba(239, 68, 68, 0.5); background: rgba(239, 68, 68, 0.05); }
        
        .graph-edge { position: absolute; left: -15px; top: 0; width: 2px; height: 100%; border-left: 2px dashed rgba(255,255,255,0.2); }
        .graph-arrow { position: absolute; left: -21px; bottom: -25px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid rgba(255,255,255,0.2); }
        
        .node-tag { position: absolute; right: 15px; top: -10px; font-size: 9px; font-weight: 900; padding: 3px 10px; border-radius: 12px; letter-spacing: 0.05em; }
        .node-tag.root { background: var(--success); color: #000; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .node-tag.exception { background: var(--error); color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        
        .recommendation-card { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); padding: 1.5rem; border-radius: 16px; margin-top: 3rem; }
        .btn { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s ease; }
        .btn:hover:not(:disabled) { background: #60a5fa; transform: translateY(-1px); }
        .btn-secondary { background: #222; color: #fff; border: 1px solid var(--border); }
        .btn-secondary:hover { background: #333; }
        
        .logo { font-size: 0.85rem; font-weight: 900; letter-spacing: 2px; color: var(--accent); margin-bottom: 3rem; padding-left: 10px; }
        .file-item { padding: 10px 16px; font-size: 0.8rem; color: var(--text-dim); cursor: pointer; border-radius: 6px; transition: all 0.2s; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .file-item:hover { background: rgba(255, 255, 255, 0.03); color: var(--text); }
        .file-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; }
        
        .stats-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; padding: 4rem; overflow-y: auto; backdrop-filter: blur(40px); }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.75); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const safeGetStats = () => {
            try {
                const data = localStorage.getItem('pyglide_stats');
                if (data) {
                    const parsed = JSON.parse(data);
                    if (parsed && parsed.concepts && typeof parsed.total === 'number') {
                        return parsed;
                    }
                }
            } catch (e) {
                console.error("Stats parse error:", e);
            }
            return { total: 0, concepts: {} };
        };

        const safeSaveStats = (stats) => {
            try {
                localStorage.setItem('pyglide_stats', JSON.stringify(stats));
            } catch (e) {
                console.error("Stats save error:", e);
            }
        };

        const TEST_FILES = [
            { id: '1', name: 'n_queens_recursion.py', content: 'def is_safe(board, row, col, n):\n    for i in range(col):\n        if board[row][i]: return False\n    return True\n\ndef solve(board, col, n):\n    if col >= n: return True\n    for i in range(n):\n        if is_safe(board, i, col, n):\n            # ROOT CAUSE: board is initialized with n-1 rows\n            board[i][col] = 1 \n            if solve(board, col + 1, n): return True\n            board[i][col] = 0\n    return False\n\nn = 4\nboard = [[0 for _ in range(n)] for _ in range(n-1)]\nsolve(board, 0, n)' },
            { id: '2', name: 'data_schema_audit.py', content: 'def process_user(user_data):\n    print(f"Auditing user: {user_data[\'id\']}")\n    # This key is missing in the second user\n    return user_data["metadata"]["last_login"]\n\nusers = [\n    {"id": 101, "metadata": {"last_login": "2024-05-01"}},\n    {"id": 102, "metadata": {}}\n]\n\nfor u in users:\n    process_user(u)' },
            { id: '3', name: 'division_logic.py', content: 'def calculate_ratio(a, b):\n    return a / b\n\ndef process_set(val):\n    return calculate_ratio(val, 0)\n\nprocess_set(10)' }
        ];

        // Parse streamed plain text into 3 sections
        const parseStreamedSections = (text) => {
            const s = text.match(/SYMPTOM:\s*([\s\S]*?)(?=CAUSE:|$)/i);
            const c = text.match(/CAUSE:\s*([\s\S]*?)(?=RESOLUTION:|$)/i);
            const r = text.match(/RESOLUTION:\s*([\s\S]*?)$/i);
            return {
                symptom: s ? s[1].trim() : null,
                cause:   c ? c[1].trim() : null,
                resolution: r ? r[1].trim() : null
            };
        };

        // Streaming LLM call - calls onChunk with each accumulated token, onDone when finished
        const streamLLM = (errorType, errorMsg, lineCode, onChunk, onDone, onFallback) => {
            const prompt = `You are a Python debugging assistant inside a student IDE. Explain the error concisely.

Error Type: ${errorType}
Failing Code: ${lineCode || 'N/A'}
Error Message: ${errorMsg.split('\n').slice(-2).join(' ')}

Respond in exactly this plain-text format (no markdown, no extra headings):
SYMPTOM: [One sentence: what went wrong]
CAUSE: [Two to three sentences: why Python failed here]
RESOLUTION: [Two sentences: the specific fix to apply]`;

            fetch('http://localhost:11434/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: 'qwen2.5-coder:1.5b', prompt, stream: true }),
                signal: AbortSignal.timeout(20000)
            }).then(response => {
                if (!response.ok) { onFallback(); return; }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulated = '';
                const readChunk = () => {
                    reader.read().then(({ done, value }) => {
                        if (done) { onDone(accumulated); return; }
                        const text = decoder.decode(value, { stream: true });
                        const lines = text.split('\n').filter(l => l.trim());
                        for (const line of lines) {
                            try {
                                const obj = JSON.parse(line);
                                if (obj.response) {
                                    accumulated += obj.response;
                                    onChunk(accumulated);
                                }
                                if (obj.done) { onDone(accumulated); return; }
                            } catch(e) {}
                        }
                        readChunk();
                    }).catch(() => onDone(accumulated));
                };
                readChunk();
            }).catch(() => onFallback());
        };

        // =========================================================
        // PageRank-based Root Cause Identification
        // Ported from SemanticLogDebugger_RootCauseAnalysis/SematicLogDebugger_Final.ipynb
        // Core algorithm: perform_rca() - builds a DAG from the execution trace,
        // runs PageRank (alpha=0.85) and picks the highest-scoring node as root cause.
        // =========================================================
        const pageRank = (nodes, edges, alpha = 0.85, maxIter = 100, tol = 1e-6) => {
            if (nodes.length === 0) return {};
            const N = nodes.length;
            const nodeIdx = {};
            nodes.forEach((n, i) => nodeIdx[n] = i);

            // Build adjacency: outEdges[i] = list of j that i points to
            const outEdges = Array.from({length: N}, () => []);
            const inEdges  = Array.from({length: N}, () => []);
            edges.forEach(([src, dst]) => {
                const s = nodeIdx[src], d = nodeIdx[dst];
                if (s !== undefined && d !== undefined) {
                    outEdges[s].push(d);
                    inEdges[d].push(s);
                }
            });

            let scores = new Array(N).fill(1 / N);
            for (let iter = 0; iter < maxIter; iter++) {
                const newScores = new Array(N).fill((1 - alpha) / N);
                for (let i = 0; i < N; i++) {
                    const outs = outEdges[i];
                    if (outs.length === 0) {
                        // Dangling node: distributes rank equally to all
                        const share = alpha * scores[i] / N;
                        for (let j = 0; j < N; j++) newScores[j] += share;
                    } else {
                        const share = alpha * scores[i] / outs.length;
                        outs.forEach(j => newScores[j] += share);
                    }
                }
                // Check convergence
                const diff = scores.reduce((s, v, i) => s + Math.abs(v - newScores[i]), 0);
                scores = newScores;
                if (diff < tol) break;
            }

            const result = {};
            nodes.forEach((n, i) => result[n] = scores[i]);
            return result;
        };

        const analyze = (msg, code) => {
            const frames = [];
            const codeLines = code.split('\n');
            const totalLines = codeLines.length;
            const regex = /File "(.*)", line (\d+), in (.*)/g;
            let m;
            while ((m = regex.exec(msg)) !== null) {
                const ln = parseInt(m[2]);
                if (ln <= totalLines) frames.push({ line: ln, func: m[3], code: codeLines[ln-1] || "" });
            }
            if (frames.length === 0) {
                const lnMatch = msg.match(/line (\d+)/);
                if (lnMatch) {
                    const ln = parseInt(lnMatch[1]);
                    if (ln <= totalLines) frames.push({ line: ln, func: "module", code: codeLines[ln-1] || "" });
                }
            }

            const insights = [
                { 
                    pattern: /SyntaxError/, 
                    title: "Syntax Error", 
                    symptom: "Python could not parse the code at line {LINE} — this is a compilation failure, not a runtime failure.", 
                    cause: "A syntax error means the code structure violated Python grammar rules. Common causes include a missing colon after `def` or `if`, mismatched parentheses or brackets, invalid use of operators, or illegal indentation.",
                    resolution: "Carefully inspect the flagged line and the line immediately above it. Look for unclosed brackets, missing colons, or misplaced keywords."
                },
                { 
                    pattern: /IndentationError/, 
                    title: "Indentation Error", 
                    symptom: "Python detected an inconsistent or unexpected indentation level at line {LINE}.", 
                    cause: "Python uses indentation to define code blocks. Mixing tabs and spaces, or using inconsistent indent widths across a block, causes the parser to reject the file before execution.",
                    resolution: "Ensure all indentation uses consistent spaces (4 spaces recommended). Use an editor with visible whitespace to detect tab/space mixing. The offending line is typically one that breaks the expected indentation depth."
                },
                { 
                    pattern: /ZeroDivision/, 
                    title: "Mathematical Inconsistency", 
                    symptom: "The program attempted to divide a number by zero at line {LINE}.", 
                    cause: "Python cannot mathematically reconcile division by zero. This usually happens when a variable acting as a denominator evaluates to 0 during runtime — often because of an unvalidated user input or a loop that reduces a counter to zero.",
                    resolution: "Implement a guard clause (e.g., `if denominator == 0: return`) before the division operation. Trace which code path produces the zero denominator and validate input early."
                },
                { 
                    pattern: /IndexError/, 
                    title: "Boundary Violation", 
                    symptom: "The code attempted to access an element in a sequence using an out-of-bounds index at line {LINE}.", 
                    cause: "The index requested is either greater than the maximum valid index (length - 1), or negative enough to wrap past the beginning of the sequence. For example, accessing index 4 in a 3-item list.",
                    resolution: "Verify your loop boundaries or index calculations. Ensure they strictly satisfy `0 <= index < len(sequence)`. Consider using `enumerate()` for safe iteration instead of manual indexing."
                },
                { 
                    pattern: /KeyError/, 
                    title: "Schema Violation", 
                    symptom: "A required data identifier (key) was missing from a dictionary at line {LINE}.", 
                    cause: "The code explicitly requested a key that does not exist in the current dictionary. This often occurs when processing dynamic API responses, iterating over objects with inconsistent schemas, or after a key was renamed or removed.",
                    resolution: "Use `dict.get(key, default_value)` for safe access, or check `if key in dict:` before accessing. For nested keys, validate each level independently before accessing."
                },
                { 
                    pattern: /NameError/, 
                    title: "Identifier Failure", 
                    symptom: "An undefined variable or function name was referenced at line {LINE}.", 
                    cause: "The Python interpreter encountered a name it does not recognize in the current scope. This is typically due to a typo, a missing import statement, or calling a variable before it has been assigned a value in the executing scope.",
                    resolution: "Check the spelling of the identifier carefully. Ensure the variable is assigned before use, and that any required modules are imported at the top of the file. If defined inside a function, verify the scope is accessible from the call site."
                }
            ];
            
            let ins = { 
                title: "Logic Anomaly", 
                symptom: "A logical interruption occurred during execution at line {LINE}.", 
                cause: "An unexpected state was reached that the runtime could not process.",
                resolution: "Review the causal chain below to trace the exact injection point of the fault."
            };
            
            for (const i of insights) if (i.pattern.test(msg)) ins = i;

            const stats = safeGetStats();
            stats.total += 1;
            stats.concepts[ins.title] = (stats.concepts[ins.title] || 0) + 1;
            safeSaveStats(stats);

            // =========================================================
            // DAG + PageRank Root Cause Selection
            // Mirrors SemanticLogDebugger.perform_rca():
            //   G = nx.DiGraph((seq[i], seq[i+1]) for i in range(len(seq)-1))
            //   chosen = max(nx.pagerank(G, alpha=0.85), key=scores.get)
            // Frames = trace nodes; sequential call order = directed edges
            // =========================================================
            let rcIdx = 0;
            let rcExplanation = 'fallback: single frame';

            if (frames.length === 1) {
                rcIdx = 0;
                rcExplanation = 'singleton trace';
            } else if (frames.length > 1) {
                // Build node list (use func+line as unique node ID)
                const nodeIds = frames.map((f, i) => `${f.func}@${f.line}@${i}`);
                // Build edges: execution order seq[i] -> seq[i+1]
                const edges = [];
                for (let i = 0; i < nodeIds.length - 1; i++) {
                    edges.push([nodeIds[i], nodeIds[i + 1]]);
                }
                const scores = pageRank(nodeIds, edges, 0.85);
                // Find the frame with the highest PageRank score
                let bestScore = -1;
                nodeIds.forEach((nid, i) => {
                    if (scores[nid] > bestScore) { bestScore = scores[nid]; rcIdx = i; }
                });
                rcExplanation = `root by PageRank (score: ${bestScore.toFixed(4)})`;
            }

            const lineRef = frames.length > 0 ? frames[rcIdx].line : "?";
            const rcFrame = frames[rcIdx];
            const lineCode = rcFrame ? rcFrame.code.trim() : '';
            
            return { 
                frames, 
                rc: rcIdx,
                rawMsg: msg,
                lineCode,
                ins: { 
                    title: ins.title,
                    symptom: ins.symptom.replace(/{LINE}/g, lineRef),
                    cause: ins.cause.replace(/{LINE}/g, lineRef),
                    resolution: ins.resolution.replace(/{LINE}/g, lineRef)
                } 
            };
        };

        function AnalyticsPanel({ onBack }) {
            const stats = safeGetStats();
            const entries = Object.entries(stats.concepts).sort((a,b)=>b[1]-a[1]);
            const maxVal = Math.max(...Object.values(stats.concepts), 1);
            
            const getRecommendation = () => {
                if (entries.length === 0) return "Begin coding to generate performance insights.";
                const topError = entries[0][0];
                const maps = {
                    "MATHEMATICAL INCONSISTENCY": "Focus on 'Guard Clauses' and 'Input Validation'. Always validate denominators and divisors before performing arithmetic operations.",
                    "BOUNDARY VIOLATION": "Focus on 'Off-by-one errors' and using `enumerate()` instead of manual indexing. Always validate list lengths before loop access.",
                    "SCHEMA VIOLATION": "Focus on 'Defensive Programming'. Prefer dict.get() over direct key access, and validate incoming data schemas before processing.",
                    "IDENTIFIER FAILURE": "Focus on 'Variable Scope' and declaration order. Ensure all variables are defined before use and module imports are at the top.",
                    "SYNTAX ERROR": "Focus on Python's grammar rules — colons after blocks, matching brackets, and consistent indentation. Use an IDE linter to catch issues before running.",
                    "INDENTATION ERROR": "Standardize on 4-space indentation throughout all files. Never mix tabs and spaces. Configure your editor to show whitespace characters."
                };
                return maps[topError.toUpperCase()] || "Focus on modularizing your code to isolate and identify logical leaks.";
            };

            return (
                <div className="stats-overlay">
                    <div style={{maxWidth:'800px', margin:'0 auto'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4rem'}}>
                            <h1 style={{fontSize:'2.5rem', fontWeight:300, letterSpacing:'-0.02em'}}>ANALYTICS ENGINE</h1>
                            <button className="btn btn-secondary" onClick={onBack}>RETURN TO EDITOR</button>
                        </div>
                        
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'2rem', marginBottom:'3rem'}}>
                            <div style={{background:'rgba(255,255,255,0.02)', padding:'2.5rem', borderRadius:'24px', border:'1px solid var(--border)'}}>
                                <div style={{fontSize:'0.75rem', color:'var(--text-dim)', marginBottom:'0.5rem', fontWeight:800, textTransform:'uppercase'}}>Total Faults Detected</div>
                                <div style={{fontSize:'4rem', fontWeight:800, color:'var(--accent)', lineHeight:'1'}}>{stats.total}</div>
                            </div>
                            <div className="recommendation-card" style={{marginTop:0}}>
                                <div style={{fontSize:'0.75rem', fontWeight:800, color:'var(--accent)', marginBottom:'0.75rem', textTransform:'uppercase'}}>Priority Focus</div>
                                <div style={{fontSize:'1.1rem', lineHeight:'1.6', fontWeight:500, color:'#e2e8f0'}}>{getRecommendation()}</div>
                            </div>
                        </div>

                        <div style={{display:'flex', flexDirection:'column', gap:'2.5rem'}}>
                            <h2 style={{fontSize:'1rem', fontWeight:700, color:'var(--text-dim)', borderBottom:'1px solid var(--border)', paddingBottom:'1rem'}}>FAULT DISTRIBUTION</h2>
                            {entries.map(([c, count]) => (
                                <div key={c}>
                                    <div style={{display:'flex', justifyContent:'space-between', fontSize:'0.95rem', marginBottom:'0.75rem', fontWeight:600}}>
                                        <span>{c.toUpperCase()}</span>
                                        <span style={{color:'var(--accent)'}}>{count}</span>
                                    </div>
                                    <div style={{height:'8px', background:'rgba(255,255,255,0.05)', borderRadius:'4px', overflow:'hidden'}}>
                                        <div style={{height:'100%', background:'var(--accent)', width: `${(count/maxVal)*100}%`, borderRadius:'4px'}}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const loadFiles = () => {
            try {
                const saved = localStorage.getItem('pyglide_workspace');
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            return TEST_FILES.map(f => ({...f, type: 'file', parentId: null}));
        };
        const loadTabs = () => {
            try {
                const saved = localStorage.getItem('pyglide_tabs');
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            return ['1'];
        };

        function App() {
            const [files, setFiles] = useState(loadFiles());
            const [activeId, setActiveId] = useState(() => localStorage.getItem('pyglide_activeId') || '1');
            const [openTabs, setOpenTabs] = useState(loadTabs());
            const [worker, setWorker] = useState(null);
            const [engineReady, setEngineReady] = useState(false);
            
            const termRef = useRef(null);
            const termInstance = useRef(null);
            const fitAddonRef = useRef(null);
            const currentLineRef = useRef('');
            const isWaitingForInputRef = useRef(false);
            const pendingInputUidRef = useRef(null);
            const isReplRef = useRef(true);
            const workerRef = useRef(null);
            
            const [termHeight, setTermHeight] = useState(250);

            const [rca, setRca] = useState(null);
            const [view, setView] = useState('editor');
            const [creatingItem, setCreatingItem] = useState(null);
            const [newItemName, setNewItemName] = useState('');
            const [draggedNodeId, setDraggedNodeId] = useState(null);
            const [dragOverNodeId, setDragOverNodeId] = useState(null);
            const [editorReady, setEditorReady] = useState(false);
            
            const activeIdRef = useRef(activeId);
            useEffect(() => { activeIdRef.current = activeId; }, [activeId]);
            
            useEffect(() => { localStorage.setItem('pyglide_workspace', JSON.stringify(files)); }, [files]);
            useEffect(() => { localStorage.setItem('pyglide_tabs', JSON.stringify(openTabs)); }, [openTabs]);
            useEffect(() => { localStorage.setItem('pyglide_activeId', activeId || ''); }, [activeId]);
            
            const [replInput, setReplInput] = useState('');

            const monacoRef = useRef(null);
            const editorInstance = useRef(null);

            useEffect(() => {
                if (window.require && monacoRef.current && !editorInstance.current) {
                    window.MonacoEnvironment = {
                        getWorkerUrl: function(workerId, label) {
                            return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                                self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/' };
                                importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/base/worker/workerMain.js');
                            `)}`;
                        }
                    };
                    
                    window.require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
                    window.require(['vs/editor/editor.main'], function() {
                        window.monaco.editor.defineTheme('pyglide-dark', {
                            base: 'vs-dark',
                            inherit: true,
                            rules: [],
                            colors: { 'editor.background': '#0f0f11' }
                        });
                        editorInstance.current = window.monaco.editor.create(monacoRef.current, {
                            value: '', 
                            language: 'python',
                            theme: 'pyglide-dark',
                            automaticLayout: true,
                            minimap: { enabled: false },
                            fontSize: 14,
                            fontFamily: "'JetBrains Mono', monospace"
                        });
                        
                        editorInstance.current.onDidChangeModelContent(() => {
                            if (!editorInstance.current || !activeIdRef.current) return;
                            const val = editorInstance.current.getValue();
                            setFiles(prev => prev.map(f => f.id === activeIdRef.current ? { ...f, content: val } : f));
                            setRca(null); // Clear stale RCA
                        });
                        
                        // Register Pyodide Live Autocompletion
                        window.monaco.languages.registerCompletionItemProvider('python', {
                            triggerCharacters: ['.'],
                            provideCompletionItems: async function(model, position) {
                                const textUntilPosition = model.getValueInRange({
                                    startLineNumber: position.lineNumber, startColumn: 1,
                                    endLineNumber: position.lineNumber, endColumn: position.column
                                });
                                const match = textUntilPosition.match(/([a-zA-Z0-9_]+)\.$/);
                                if (!match) return { suggestions: [] };
                                const objName = match[1];
                                const pyInstance = pyRef.current;
                                if (!pyInstance) return { suggestions: [] };
                                
                                try {
                                    pyInstance.globals.set('__autocomplete_obj__', objName);
                                    const code = `
import builtins
try:
    obj = globals().get(__autocomplete_obj__, getattr(builtins, __autocomplete_obj__, None))
    if obj is not None:
        ",".join([d for d in dir(obj) if not d.startswith('_')])
    else:
        ""
except:
    ""
`;
                                    const attrs = await pyInstance.runPythonAsync(code);
                                    if (attrs) {
                                        const suggestions = attrs.split(',').map(attr => ({
                                            label: attr,
                                            kind: window.monaco.languages.CompletionItemKind.Property,
                                            insertText: attr
                                        }));
                                        return { suggestions };
                                    }
                                } catch (e) {}
                                return { suggestions: [] };
                            }
                        });

                        setEditorReady(true);
                    });
                }
            }, []);

            const activeFile = files.find(f => f.id === activeId);

            useEffect(() => {
                if (editorReady && editorInstance.current && activeFile) {
                    const currentVal = editorInstance.current.getValue();
                    if (currentVal !== activeFile.content) {
                        editorInstance.current.setValue(activeFile.content || '');
                    }
                } else if (editorReady && editorInstance.current && !activeFile) {
                    editorInstance.current.setValue('');
                }
            }, [activeId, activeFile, editorReady]);

            const openFile = (id) => {
                if (!openTabs.includes(id)) setOpenTabs([...openTabs, id]);
                setActiveId(id);
                setRca(null);
                rebootWorker();
            };

            const closeTab = (e, id) => {
                e.stopPropagation();
                const newTabs = openTabs.filter(t => t !== id);
                setOpenTabs(newTabs);
                if (activeId === id) {
                    const nextId = newTabs.length > 0 ? newTabs[newTabs.length - 1] : null;
                    setActiveId(nextId);
                    rebootWorker();
                }
            };

            const downloadWorkspace = async () => {
                if (!window.JSZip) return;
                const zip = new window.JSZip();
                const addFilesToZip = (parentId, currentFolder) => {
                    const children = files.filter(f => f.parentId === parentId);
                    for (const f of children) {
                        if (f.type === 'folder') {
                            const newFolder = currentFolder.folder(f.name);
                            addFilesToZip(f.id, newFolder);
                        } else {
                            currentFolder.file(f.name, f.content || "");
                        }
                    }
                };
                addFilesToZip(null, zip);
                const blob = await zip.generateAsync({ type: "blob" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "pyglide_workspace.zip";
                a.click();
                URL.revokeObjectURL(url);
            };

            // Initialize Xterm.js
            useEffect(() => {
                console.log("XTERM SETUP TRIGGERED");
                console.log("window.Terminal:", !!window.Terminal, "termRef.current:", !!termRef.current);
                try {
                    if (!termInstance.current && termRef.current && window.Terminal) {
                        console.log("INITIALIZING XTERM INSTANCE...");
                        const term = new window.Terminal({
                            theme: { background: '#070708', foreground: '#e2e8f0', cursor: '#3b82f6' },
                            fontFamily: "'JetBrains Mono', monospace",
                            fontSize: 13,
                            cursorBlink: true
                        });
                        let fitAddon = null;
                        if (window.FitAddon) {
                            if (typeof window.FitAddon.FitAddon === 'function') {
                                fitAddon = new window.FitAddon.FitAddon();
                            } else if (typeof window.FitAddon === 'function') {
                                fitAddon = new window.FitAddon();
                            }
                        }
                        if (fitAddon) {
                            fitAddonRef.current = fitAddon;
                            term.loadAddon(fitAddon);
                        }
                        term.open(termRef.current);
                        
                        // Delay fit slightly to ensure container is sized
                        if (fitAddon) {
                            setTimeout(() => fitAddon.fit(), 100);
                        }
                        
                        termInstance.current = term;

                        term.write('PYGLIDE SYSTEM CONSOLE\r\n');
                        term.write('>>> ');

                        term.onData(e => {
                            if (!isWaitingForInputRef.current && !isReplRef.current) return;

                            switch (e) {
                                case '\r': // Enter
                                    term.write('\r\n');
                                    const code = currentLineRef.current;
                                    currentLineRef.current = '';
                                    if (isWaitingForInputRef.current) {
                                        isWaitingForInputRef.current = false;
                                        provideInput(code);
                                    } else if (isReplRef.current) {
                                        handleReplEnter(code);
                                    }
                                    break;
                                case '\u007F': // Backspace
                                    if (currentLineRef.current.length > 0) {
                                        currentLineRef.current = currentLineRef.current.slice(0, -1);
                                        term.write('\b \b');
                                    }
                                    break;
                                default:
                                    if ((e >= String.fromCharCode(0x20) && e <= String.fromCharCode(0x7E)) || e.length >= 2) {
                                        currentLineRef.current += e;
                                        term.write(e);
                                    }
                            }
                        });
                        
                        window.addEventListener('resize', () => { if (fitAddonRef.current) fitAddonRef.current.fit(); });
                    }
                } catch (e) {
                    console.error("XTERM INIT ERROR:", e);
                }
            }, []);

            const startResize = (e) => {
                e.preventDefault();
                const startY = e.clientY;
                const startHeight = termHeight;
                
                const onMouseMove = (moveEvent) => {
                    const deltaY = startY - moveEvent.clientY;
                    const newHeight = Math.max(100, Math.min(startHeight + deltaY, window.innerHeight - 100));
                    setTermHeight(newHeight);
                };
                
                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    if (fitAddonRef.current) fitAddonRef.current.fit();
                };
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };

            const rebootWorker = (fromRun = false) => {
                if (workerRef.current) {
                    workerRef.current.terminate();
                }
                isWaitingForInputRef.current = false;
                pendingInputUidRef.current = null;
                isReplRef.current = !fromRun;
                currentLineRef.current = '';
                
                if (termInstance.current) {
                    termInstance.current.clear();
                    termInstance.current.write('\x1bcPYGLIDE SYSTEM CONSOLE\r\n');
                    if (!fromRun) {
                        termInstance.current.write('>>> ');
                    }
                }
                
                setEngineReady(false);
                const w = new Worker('/pyworker.js?t=' + Date.now());
                w.onmessage = (e) => {
                    const { type, msg, uid, id, error, result } = e.data;
                    if (type === 'stdout' || type === 'stderr') {
                        if (termInstance.current) {
                            const colorPrefix = type === 'stderr' ? '\x1b[31m' : '';
                            const colorSuffix = type === 'stderr' ? '\x1b[0m' : '';
                            termInstance.current.write(colorPrefix + msg.replace(/\n/g, '\r\n') + colorSuffix);
                        }
                    } else if (type === 'done' || type === 'error') {
                        if (type === 'error' && termInstance.current) {
                            termInstance.current.write('\x1b[31m' + error.replace(/\n/g, '\r\n') + '\x1b[0m\r\n');
                        }
                        if (type === 'done' && result !== undefined && termInstance.current) {
                            termInstance.current.write(String(result).replace(/\n/g, '\r\n') + '\r\n');
                        }
                        
                        if (id === 'run_main' || id.startsWith('repl_')) {
                            if (termInstance.current) termInstance.current.write('>>> ');
                            isReplRef.current = true;
                        }

                        if (type === 'error') {
                            const currentCode = editorInstance.current ? editorInstance.current.getValue() : '';
                            const base = analyze(error, currentCode);
                            setRca({ ...base, llmLoading: true, streamText: '' });
                            streamLLM(
                                base.ins.title, error, base.lineCode,
                                (accumulated) => setRca(p => p ? { ...p, streamText: accumulated } : p),
                                (finalText) => {
                                    const parsed = parseStreamedSections(finalText);
                                    setRca(p => p ? { ...p, llmLoading: false, streamText: finalText, ins: { title: base.ins.title, symptom: parsed.symptom || base.ins.symptom, cause: parsed.cause || base.ins.cause, resolution: parsed.resolution || base.ins.resolution } } : p);
                                },
                                () => setRca(p => p ? { ...p, llmLoading: false, streamText: null } : p)
                            );
                        }
                    }
                };
                
                setWorker(w);
                workerRef.current = w;
                setEngineReady(true);
            };

            // Initialize Service Worker and Web Worker
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js').then(() => {
                        if (navigator.serviceWorker.controller) {
                            rebootWorker();
                        } else {
                            navigator.serviceWorker.addEventListener('controllerchange', () => {
                                if (!workerRef.current) rebootWorker();
                            });
                        }
                    }).catch(err => {
                        console.error("SW Registration failed:", err);
                        rebootWorker(); // Fallback
                    });
                    
                    navigator.serviceWorker.addEventListener('message', (event) => {
                        if (event.data && event.data.type === 'input_requested') {
                            pendingInputUidRef.current = event.data.uid;
                            isWaitingForInputRef.current = true;
                            isReplRef.current = false;
                        }
                    });
                } else {
                    rebootWorker();
                }

                return () => { if (workerRef.current) workerRef.current.terminate(); };
            }, []);

            const provideInput = async (value) => {
                if (!pendingInputUidRef.current) return;
                
                const formData = new FormData();
                formData.append('uid', pendingInputUidRef.current);
                formData.append('value', value);
                
                pendingInputUidRef.current = null;
                
                await fetch('/__pyglide_provide_input__', {
                    method: 'POST',
                    body: formData
                });
            };

            const run = async () => {
                if (!editorInstance.current) return;
                const currentCode = editorInstance.current.getValue() || '';
                setRca(null);
                
                rebootWorker(true);
                
                isReplRef.current = false;
                isWaitingForInputRef.current = false;
                currentLineRef.current = '';
                
                workerRef.current.postMessage({ type: 'run', id: 'run_main', code: currentCode });
            };
            
            const handleReplEnter = async (code) => {
                if (!workerRef.current) return;
                const trimmed = code.trim();
                if (!trimmed) {
                    if (termInstance.current) termInstance.current.write('>>> ');
                    return;
                }
                
                isReplRef.current = false;
                workerRef.current.postMessage({ type: 'repl', id: 'repl_' + Date.now(), code: trimmed });
            };



            const toggleFolder = (id) => {
                setFiles(prev => prev.map(f => f.id === id ? { ...f, isOpen: !f.isOpen } : f));
            };

            const confirmCreateItem = () => {
                if (!newItemName.trim() || !creatingItem) {
                    setCreatingItem(null);
                    return;
                }
                let finalName = newItemName.trim();
                if (creatingItem.type === 'file' && !finalName.endsWith('.py')) finalName += '.py';
                
                const isDuplicate = files.some(f => f.parentId === creatingItem.parentId && f.name === finalName);
                if (isDuplicate) {
                    alert(`An item named "${finalName}" already exists in this folder.`);
                    return;
                }

                const newId = Date.now().toString();
                const newItem = { 
                    id: newId, 
                    name: finalName, 
                    type: creatingItem.type,
                    parentId: creatingItem.parentId,
                    ...(creatingItem.type === 'file' ? { content: '' } : { isOpen: true })
                };
                
                setFiles([...files, newItem]);
                if (creatingItem.type === 'file') openFile(newId);
                setCreatingItem(null);
                setNewItemName('');
            };

            const handleNewItemKeyDown = (e) => {
                if (e.key === 'Enter') confirmCreateItem();
                else if (e.key === 'Escape') setCreatingItem(null);
            };

            const handleDragStart = (e, id) => {
                e.dataTransfer.setData('text/plain', id);
                setDraggedNodeId(id);
                e.stopPropagation();
            };

            const handleDrop = (e, dropId) => {
                e.preventDefault();
                e.stopPropagation();
                setDragOverNodeId(null);
                setDraggedNodeId(null);
                
                const dragId = e.dataTransfer.getData('text/plain');
                if (!dragId || dragId === dropId) return;

                const isDescendant = (childId, parentId) => {
                    let current = files.find(f => f.id === childId);
                    while (current && current.parentId) {
                        if (current.parentId === parentId) return true;
                        current = files.find(f => f.id === current.parentId);
                    }
                    return false;
                };

                if (dropId !== null && isDescendant(dropId, dragId)) {
                    alert("Cannot move a folder into its own subfolder.");
                    return;
                }

                setFiles(prev => {
                    const newFiles = [...prev];
                    const dragIndex = newFiles.findIndex(f => f.id === dragId);
                    if (dragIndex === -1) return prev;
                    
                    const dragNode = newFiles[dragIndex];
                    let targetParentId = null;
                    let dropIndex = -1;

                    if (dropId !== null) {
                        const dropNode = newFiles.find(f => f.id === dropId);
                        if (!dropNode) return prev;
                        if (dropNode.type === 'folder') {
                            targetParentId = dropId;
                        } else {
                            targetParentId = dropNode.parentId;
                            dropIndex = newFiles.findIndex(f => f.id === dropId);
                        }
                    }

                    const duplicate = newFiles.some(f => f.id !== dragId && f.parentId === targetParentId && f.name === dragNode.name);
                    if (duplicate) {
                        alert(`An item named "${dragNode.name}" already exists in the destination.`);
                        return prev;
                    }

                    dragNode.parentId = targetParentId;
                    newFiles.splice(dragIndex, 1);

                    if (dropIndex !== -1) {
                        // Adjust index if we removed an item before it
                        if (dragIndex < dropIndex) dropIndex--;
                        newFiles.splice(dropIndex, 0, dragNode);
                    } else {
                        newFiles.push(dragNode);
                        if (dropId !== null) {
                            const dropNode = newFiles.find(f => f.id === dropId);
                            if (dropNode) dropNode.isOpen = true;
                        }
                    }
                    return newFiles;
                });
            };

            const renderTree = (parentId, level = 0) => {
                const nodes = files.filter(f => f.parentId === parentId);
                const children = nodes.map(f => {
                    const isDragOver = dragOverNodeId === f.id;
                    const styleBase = { 
                        paddingLeft: `${10 + level * 15}px`, 
                        border: isDragOver ? '1px dashed var(--accent)' : '1px solid transparent',
                        background: isDragOver ? 'var(--accent-dim)' : ''
                    };
                    
                    if (f.type === 'folder') {
                        return (
                            <div key={f.id}>
                                <div className="file-item" 
                                    style={{ ...styleBase, display: 'flex', justifyContent: 'space-between', fontWeight: 600 }} 
                                    onClick={() => toggleFolder(f.id)}
                                    draggable
                                    onDragStart={(e) => handleDragStart(e, f.id)}
                                    onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setDragOverNodeId(f.id); }}
                                    onDragLeave={() => setDragOverNodeId(null)}
                                    onDrop={(e) => handleDrop(e, f.id)}
                                >
                                    <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                        {f.name}
                                    </span>
                                    <div style={{display:'flex', gap:'8px'}}>
                                        <button onClick={(e) => { e.stopPropagation(); setCreatingItem({ type: 'file', parentId: f.id }); setNewItemName(''); if(!f.isOpen) toggleFolder(f.id); }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'0.9rem'}} title="New File">+</button>
                                        <button onClick={(e) => { e.stopPropagation(); setCreatingItem({ type: 'folder', parentId: f.id }); setNewItemName(''); if(!f.isOpen) toggleFolder(f.id); }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'0.9rem'}} title="New Folder">📁</button>
                                    </div>
                                </div>
                                {f.isOpen && renderTree(f.id, level + 1)}
                            </div>
                        );
                    } else {
                        return (
                            <div key={f.id} 
                                className={`file-item ${activeId === f.id ? 'active' : ''}`} 
                                style={styleBase} 
                                onClick={() => openFile(f.id)}
                                draggable
                                onDragStart={(e) => handleDragStart(e, f.id)}
                                onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setDragOverNodeId(f.id); }}
                                onDragLeave={() => setDragOverNodeId(null)}
                                onDrop={(e) => handleDrop(e, f.id)}
                            >
                                <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                    {f.name}
                                </span>
                            </div>
                        );
                    }
                });

                if (creatingItem && creatingItem.parentId === parentId) {
                    children.push(
                        <div key="new-item" className="file-item" style={{ paddingLeft: `${10 + level * 15}px`, display: 'flex', alignItems: 'center', gap: '6px' }}>
                            {creatingItem.type === 'folder' 
                                ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                            }
                            <input 
                                autoFocus 
                                value={newItemName} 
                                onChange={e => setNewItemName(e.target.value)} 
                                onKeyDown={handleNewItemKeyDown} 
                                onBlur={() => setCreatingItem(null)} 
                                placeholder={creatingItem.type === 'folder' ? "folder_name" : "file_name.py"} 
                                style={{background:'transparent', border:'none', outline:'none', color:'var(--text)', width:'100%', fontFamily:'inherit', fontSize:'inherit'}}
                            />
                        </div>
                    );
                }
                return children;
            };

            return (
                <div className="layout">
                    {view === 'stats' && <AnalyticsPanel onBack={()=>setView('editor')} />}
                    <aside className="sidebar">
                        <div className="logo">PYGLIDE</div>
                        <div 
                            style={{
                                display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'15px', paddingLeft:'10px', paddingRight:'10px',
                                border: dragOverNodeId === 'root' ? '1px dashed var(--accent)' : '1px solid transparent',
                                background: dragOverNodeId === 'root' ? 'var(--accent-dim)' : ''
                            }}
                            onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setDragOverNodeId('root'); }}
                            onDragLeave={() => setDragOverNodeId(null)}
                            onDrop={(e) => handleDrop(e, null)}
                        >
                            <div style={{fontSize:'0.7rem', color:'var(--text-dim)', fontWeight:800, letterSpacing:'1px'}}>EXPLORER</div>
                            <div style={{display:'flex', gap:'10px'}}>
                                <button onClick={() => { setCreatingItem({ type: 'file', parentId: null }); setNewItemName(''); }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'1rem', lineHeight:1}} title="New File">+</button>
                                <button onClick={() => { setCreatingItem({ type: 'folder', parentId: null }); setNewItemName(''); }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'1rem', lineHeight:1}} title="New Folder">📁</button>
                                <button onClick={downloadWorkspace} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'0.9rem', lineHeight:1}} title="Download Workspace">💾</button>
                            </div>
                        </div>
                        {renderTree(null)}
                        <div style={{marginTop:'auto'}} className="file-item" onClick={()=>setView('stats')}>
                            <span style={{opacity: 0.6}}>ANALYTICS ENGINE</span>
                        </div>
                    </aside>
                    <div className="main">
                        <div className="toolbar">
                            <button className="btn" onClick={run} disabled={!engineReady}>{engineReady ? "EXECUTE RUNTIME" : "LOADING ENGINE..."}</button>
                            <div style={{fontSize:'0.65rem', color:'var(--success)', fontWeight:800, letterSpacing:'1px', display:'flex', alignItems:'center', gap:'8px'}}>
                                <div style={{width:6, height:6, borderRadius:'50%', background:'var(--success)'}}></div> SYSTEM STANDBY
                            </div>
                        </div>
                        <div className="editor-zone">
                            <div className="editor-container">
                                <div className="tabs-container">
                                    {openTabs.map(tId => {
                                        const tFile = files.find(f => f.id === tId);
                                        if (!tFile) return null;
                                        return (
                                            <div key={tId} className={`editor-tab ${activeId === tId ? 'active' : ''}`} onClick={() => openFile(tId)}>
                                                <span>📄 {tFile.name}</span>
                                                <span className="tab-close" onClick={(e) => closeTab(e, tId)}>×</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div id="monaco-container" ref={monacoRef}></div>
                            </div>
                            {rca && (
                                <div className="rca-panel">
                                    <div className="rca-header">
                                        <div className="rca-title">ROOT CAUSE ANALYSIS</div>
                                        <button onClick={()=>setRca(null)} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontWeight:700, fontSize:'0.75rem', transition:'color 0.2s'}} onMouseOver={e=>e.target.style.color='#fff'} onMouseOut={e=>e.target.style.color='var(--text-dim)'}>DISMISS</button>
                                    </div>

                                    <div className="diagnostic-card">
                                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem'}}>
                                            <div style={{fontSize:'0.65rem', fontWeight:800, color:'var(--accent)', letterSpacing:'0.1em'}}>LLM DIAGNOSTIC</div>
                                            {rca.llmLoading 
                                                ? <div style={{fontSize:'0.65rem', color:'var(--text-dim)', fontWeight:700, display:'flex', alignItems:'center', gap:'6px'}}>
                                                    <div style={{width:6, height:6, borderRadius:'50%', background:'var(--accent)', animation:'pulse 1s infinite'}}></div> GENERATING...
                                                  </div>
                                                : <div style={{fontSize:'0.65rem', color:'var(--success)', fontWeight:700, display:'flex', alignItems:'center', gap:'6px'}}>
                                                    <div style={{width:6, height:6, borderRadius:'50%', background:'var(--success)'}}></div> AI INSIGHT
                                                  </div>
                                            }
                                        </div>

                                        {rca.llmLoading ? (
                                            <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:'13px', lineHeight:'1.8', color:'#e2e8f0', whiteSpace:'pre-wrap', minHeight:'80px'}}>
                                                {rca.streamText || ''}
                                                <span style={{display:'inline-block', width:'2px', height:'14px', background:'var(--accent)', verticalAlign:'text-bottom', marginLeft:'2px', animation:'pulse 0.8s steps(1) infinite'}}></span>
                                            </div>
                                        ) : (
                                            <>
                                                <div className="diagnostic-section">
                                                    <div className="diagnostic-label">1. Symptom Identified</div>
                                                    <div className="diagnostic-text">{rca.ins.symptom}</div>
                                                </div>
                                                <div className="diagnostic-section">
                                                    <div className="diagnostic-label">2. Root Cause</div>
                                                    <div className="diagnostic-text">{rca.ins.cause}</div>
                                                </div>
                                                <div className="diagnostic-section">
                                                    <div className="diagnostic-label">3. Recommended Resolution</div>
                                                    <div className="diagnostic-text">{rca.ins.resolution}</div>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                    
                                    <div>
                                        <div className="rca-title" style={{marginBottom: '2rem'}}>TECHNICAL EXECUTION TRACE</div>
                                        <div className="graph-container">
                                            {rca.frames.map((f, i) => {
                                                const isRoot = i === rca.rc;
                                                const isException = i === rca.frames.length - 1;
                                                const isBoth = isRoot && isException;
                                                return (
                                                    <div key={i} className={`graph-node ${isRoot ? 'root' : ''} ${isException ? 'exception' : ''}`}>
                                                        {/* Tags row — always inline at top to avoid absolute overlap */}
                                                        {(isRoot || isException) && (
                                                            <div style={{display:'flex', gap:'8px', marginBottom:'12px', flexWrap:'wrap'}}>
                                                                {isRoot && (
                                                                    <div style={{fontSize:'9px', fontWeight:900, background:'var(--success)', color:'#000', padding:'3px 10px', borderRadius:'12px', letterSpacing:'0.05em'}}>
                                                                        ROOT CAUSE
                                                                    </div>
                                                                )}
                                                                {isException && (
                                                                    <div style={{fontSize:'9px', fontWeight:900, background:'var(--error)', color:'#fff', padding:'3px 10px', borderRadius:'12px', letterSpacing:'0.05em'}}>
                                                                        EXCEPTION
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                        <div style={{fontSize:'13px', fontWeight:700, color:'#f8fafc', marginBottom:'10px'}}>{f.func}() <span style={{fontWeight:500, color:'var(--text-dim)'}}>at Line {f.line}</span></div>
                                                        <div style={{fontSize:'12px', color:'#93c5fd', fontFamily:'JetBrains Mono, monospace', background:'rgba(0,0,0,0.4)', padding:'10px', borderRadius:'8px', border:'1px solid rgba(147, 197, 253, 0.1)'}}>{f.code.trim()}</div>
                                                        {i < rca.frames.length - 1 && (
                                                            <div className="graph-edge">
                                                                <div className="graph-arrow"></div>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="terminal" style={{ height: `${termHeight}px` }}>
                            <div className="terminal-resizer" onMouseDown={startResize}></div>
                            <div className="terminal-header">
                                <div>SYSTEM CONSOLE & REPL</div>
                                <div style={{display:'flex', gap:'10px'}}>
                                    <button onClick={() => { if(termInstance.current) { termInstance.current.clear(); termInstance.current.write('\x1bcPYGLIDE SYSTEM CONSOLE\r\n>>> '); } }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'0.7rem', fontWeight:700}}>CLEAR</button>
                                </div>
                            </div>
                            <div id="xterm-container" ref={termRef}></div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
