                                        <button onClick={(e) => { e.stopPropagation(); setCreatingItem({ type: 'folder', parentId: f.id }); setNewItemName(''); if(!f.isOpen) toggleFolder(f.id); }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'0.9rem'}} title="New Folder">📁</button>
                                    </div>
                                </div>
                                {f.isOpen && renderTree(f.id, level + 1)}
                            </div>
                        );
                    } else {
                        return (
                            <div key={f.id} 
                                className={`file-item ${activeId === f.id ? 'active' : ''}`} 
                                style={styleBase} 
                                onClick={() => openFile(f.id)}
                                draggable
                                onDragStart={(e) => handleDragStart(e, f.id)}
                                onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setDragOverNodeId(f.id); }}
                                onDragLeave={() => setDragOverNodeId(null)}
                                onDrop={(e) => handleDrop(e, f.id)}
                            >
                                <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                    {f.name}
                                </span>
                            </div>
                        );
                    }
                });

                if (creatingItem && creatingItem.parentId === parentId) {
                    children.push(
                        <div key="new-item" className="file-item" style={{ paddingLeft: `${10 + level * 15}px`, display: 'flex', alignItems: 'center', gap: '6px' }}>
                            {creatingItem.type === 'folder' 
                                ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                            }
                            <input 
                                autoFocus 
                                value={newItemName} 
                                onChange={e => setNewItemName(e.target.value)} 
                                onKeyDown={handleNewItemKeyDown} 
                                onBlur={() => setCreatingItem(null)} 
                                placeholder={creatingItem.type === 'folder' ? "folder_name" : "file_name.py"} 
                                style={{background:'transparent', border:'none', outline:'none', color:'var(--text)', width:'100%', fontFamily:'inherit', fontSize:'inherit'}}
                            />
                        </div>
                    );
                }
                return children;
            };

            return (
                <div className="layout">
                    {view === 'stats' && <AnalyticsPanel onBack={()=>setView('editor')} />}
                    {view === 'benchmarks' && <BenchmarksPanel onBack={()=>setView('editor')} />}
                    <aside className="sidebar">
                        <div className="logo" style={{marginBottom: '1.5rem'}}>PYGLIDE</div>
                        
                        <div style={{display:'flex', flexDirection:'column', gap:'10px', padding:'0 10px', marginBottom:'2rem'}}>
                            <button className="btn btn-secondary" style={{width:'100%', display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderRadius:'6px', justifyContent:'flex-start', cursor:'pointer'}} onClick={()=>setView('stats')} title="View Programmer Focus Analytics">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
                                PROGRAMMER FOCUS
                            </button>
                            <button className="btn btn-secondary" style={{width:'100%', display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderRadius:'6px', justifyContent:'flex-start', cursor:'pointer'}} onClick={()=>setView('benchmarks')} title="View Model Benchmarks">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                                MODEL BENCHMARKS
                            </button>
                        </div>

                        <div 
                            style={{
                                display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'15px', paddingLeft:'10px', paddingRight:'10px',
                                border: dragOverNodeId === 'root' ? '1px dashed var(--accent)' : '1px solid transparent',
                                background: dragOverNodeId === 'root' ? 'var(--accent-dim)' : ''
                            }}
                            onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setDragOverNodeId('root'); }}
                            onDragLeave={() => setDragOverNodeId(null)}
                            onDrop={(e) => handleDrop(e, null)}
                        >
                            <div style={{fontSize:'0.7rem', color:'var(--text-dim)', fontWeight:800, letterSpacing:'1px'}}>EXPLORER</div>
                            <div style={{display:'flex', gap:'10px'}}>
                                <button onClick={() => { setCreatingItem({ type: 'file', parentId: null }); setNewItemName(''); }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'1rem', lineHeight:1}} title="New File">+</button>
                                <button onClick={() => { setCreatingItem({ type: 'folder', parentId: null }); setNewItemName(''); }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'1rem', lineHeight:1}} title="New Folder">📁</button>
                                <button onClick={downloadWorkspace} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'0.9rem', lineHeight:1}} title="Download Workspace">💾</button>
                            </div>
                        </div>
                        {renderTree(null)}
                    </aside>
                    <div className="main">
                        <div className="toolbar">
                            <div style={{display:'flex', gap:'10px', alignItems:'center'}}>
                                <select 
                                    value={selectedModel}
                                    onChange={(e) => setSelectedModel(e.target.value)}
                                    title="Semantic Engine Model"
                                    style={{
                                        background: 'rgba(255,255,255,0.05)',
                                        color: '#e2e8f0',
                                        border: '1px solid var(--border)',
                                        borderRadius: '4px',
                                        padding: '7px 12px',
                                        fontSize: '11px',
                                        fontWeight: '600',
                                        fontFamily: 'inherit',
                                        outline: 'none',
                                        cursor: 'pointer'
                                    }}
                                >
                                    {LOCAL_MODELS.map(m => (
                                        <option key={m.id} value={m.id} style={{background: '#0a0a0c'}}>{m.name}</option>
                                    ))}
                                </select>
                                <button className="btn" onClick={run} disabled={!engineReady}>{engineReady ? "EXECUTE RUNTIME" : "LOADING ENGINE..."}</button>
                            </div>
                            <div style={{fontSize:'0.65rem', color:'var(--success)', fontWeight:800, letterSpacing:'1px', display:'flex', alignItems:'center', gap:'8px'}}>
                                <div style={{width:6, height:6, borderRadius:'50%', background:'var(--success)'}}></div> SYSTEM STANDBY
                            </div>
                        </div>
                        <div className="editor-zone">
                            <div className="editor-container">
                                <div className="tabs-container">
                                    {openTabs.map(tId => {
                                        const tFile = files.find(f => f.id === tId);
                                        if (!tFile) return null;
                                        return (
                                            <div key={tId} className={`editor-tab ${activeId === tId ? 'active' : ''}`} onClick={() => openFile(tId)}>
                                                <span>📄 {tFile.name}</span>
                                                <span className="tab-close" onClick={(e) => closeTab(e, tId)}>×</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div id="monaco-container" ref={monacoRef}></div>
                            </div>
                            {rca && (() => {
                                const parsedStream = rca.llmLoading ? parsePartialJSON(rca.streamText) : {};
                                const activeFeedback = rca.llmLoading ? parsedStream : (rca.feedback || {});
                                
                                const deterministicIns = rca.ins;

                                return (
                                    <div className="rca-panel">
                                        <div className="rca-header">
                                            <div className="rca-title">ROOT CAUSE ANALYSIS</div>
                                            <button onClick={()=>setRca(null)} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontWeight:700, fontSize:'0.75rem', transition:'color 0.2s'}} onMouseOver={e=>e.target.style.color='#fff'} onMouseOut={e=>e.target.style.color='var(--text-dim)'}>DISMISS</button>
                                        </div>

                                        <div className="diagnostic-card" style={{border: '1px solid rgba(168, 85, 247, 0.2)', background: 'rgba(168, 85, 247, 0.05)'}}>
                                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem'}}>
                                                <div style={{fontSize:'0.65rem', fontWeight:800, color:'#a855f7', letterSpacing:'0.1em'}}>SEMANTIC LLM ANALYSIS</div>
                                                {rca.llmLoading 
                                                    ? <div style={{fontSize:'0.65rem', color:'var(--text-dim)', fontWeight:700, display:'flex', alignItems:'center', gap:'6px'}}>
                                                        <div style={{width:6, height:6, borderRadius:'50%', background:'#a855f7', animation:'pulse 1s infinite'}}></div> STREAMING...
                                                      </div>
                                                    : <div style={{fontSize:'0.65rem', color:'var(--success)', fontWeight:700, display:'flex', alignItems:'center', gap:'6px'}}>
                                                        <div style={{width:6, height:6, borderRadius:'50%', background:'var(--success)'}}></div> READY
                                                      </div>
                                                }
                                            </div>

                                            {activeFeedback && (
                                                <>
                                                    {activeFeedback.headline && (
                                                        <div className="feedback-block" style={{borderLeft: '2px solid #a855f7', paddingLeft: '1rem'}}>
                                                            <div className="feedback-block-title" style={{color: '#a855f7'}}>LLM Diagnosis</div>
                                                            <p style={{fontSize: '0.9rem', color: '#e2e8f0', lineHeight: 1.6, margin: 0}}>{activeFeedback.headline}</p>
                                                        </div>
                                                    )}
                                                    {activeFeedback.root_cause && (
                                                        <div className="feedback-block" style={{borderLeft: '2px solid #a855f7', paddingLeft: '1rem'}}>
                                                            <div className="feedback-block-title" style={{color: '#a855f7'}}>Deep Root Cause</div>
                                                            <p style={{fontSize: '0.9rem', color: '#e2e8f0', lineHeight: 1.6, margin: 0}}>{activeFeedback.root_cause}</p>
                                                        </div>
                                                    )}
                                                    {(Array.isArray(activeFeedback.evidence) && activeFeedback.evidence.length > 0) && (
                                                        <div className="feedback-block">
                                                            <div className="feedback-block-title">Evidence</div>
                                                            <ul className="feedback-list">
                                                                {activeFeedback.evidence.map((item, idx) => <li key={`e-${idx}`}>{item}</li>)}
                                                            </ul>
                                                        </div>
                                                    )}
                                                    {((Array.isArray(activeFeedback.fix_steps) && activeFeedback.fix_steps.length > 0) || activeFeedback.primary_fix || (Array.isArray(activeFeedback.code_actions) && activeFeedback.code_actions.length > 0)) && (
                                                        <div className="feedback-block">
                                                            <div className="feedback-block-title">Developer Fix Plan</div>
                                                            {Array.isArray(activeFeedback.fix_steps) && activeFeedback.fix_steps.length > 0 && (
                                                                <ol className="feedback-list">
                                                                    {activeFeedback.fix_steps.map((item, idx) => <li key={`f-${idx}`}>{item}</li>)}
                                                                </ol>
                                                            )}
                                                            {(() => {
                                                                const codeActs = Array.isArray(activeFeedback.code_actions) ? activeFeedback.code_actions : [];
                                                                const action = codeActs.find(item => item.after) || codeActs[0] || null;
                                                                const codeSuggestion = action
                                                                    ? [
                                                                        action.before ? `Current:\n${action.before}` : '',
                                                                        action.after ? `\nLearned repair pattern:\n${action.after}` : ''
                                                                      ].filter(Boolean).join('\n')
                                                                    : '';
                                                                if (codeSuggestion) {
                                                                    return <pre className="code-suggestion">{codeSuggestion}</pre>;
                                                                }
                                                                return null;
                                                            })()}
                                                        </div>
                                                    )}
                                                    {(Array.isArray(activeFeedback.prevention) && activeFeedback.prevention.length > 0) && (
                                                        <div className="feedback-block">
                                                            <div className="feedback-block-title">Prevention Checks</div>
                                                            <ul className="feedback-list">
                                                                {activeFeedback.prevention.map((item, idx) => <li key={`p-${idx}`}>{item}</li>)}
                                                            </ul>
                                                        </div>
                                                    )}
                                                    {(Array.isArray(activeFeedback.debug_questions) && activeFeedback.debug_questions.length > 0) && (
                                                        <div className="feedback-block">
                                                            <div className="feedback-block-title">Debugging Questions</div>
                                                            <ul className="feedback-list">
                                                                {activeFeedback.debug_questions.map((item, idx) => <li key={`q-${idx}`}>{item}</li>)}
                                                            </ul>
                                                        </div>
                                                    )}

                                                    {!rca.llmLoading && (
                                                        <div className="feedback-block" style={{borderColor: 'rgba(16, 185, 129, 0.25)'}}>
                                                            <div className="feedback-block-title" style={{color: 'var(--success)'}}>Translate Generated RCA</div>
                                                            <div className="translate-controls">
                                                                <select
                                                                    className="language-select"
                                                                    value={selectedLanguage}
                                                                    onChange={(e) => setSelectedLanguage(e.target.value)}
                                                                    title="Select target language"
                                                                >
                                                                    {INDIAN_LANGUAGES.map(language => (
                                                                        <option key={language.code} value={language.code}>{language.name}</option>
                                                                    ))}
                                                                </select>
                                                                <button
                                                                    className="btn btn-secondary"
                                                                    onClick={() => translateGeneratedRca(activeFeedback, deterministicIns?.explanation || '')}
                                                                    disabled={isTranslating}
                                                                >
                                                                    {isTranslating ? 'CONVERTING...' : 'CONVERT'}
                                                                </button>
                                                            </div>
                                                            {translationError && <div className="translation-error">{translationError}</div>}
                                                            {translatedRca && <pre className="translated-output">{translatedRca}</pre>}
                                                        </div>
                                                    )}
                                                </>
                                            )}

                                            {rca.mlError && (
                                                <div className="feedback-block">
                                                    <div className="feedback-block-title">Local ML Backend</div>
                                                    <div className="diagnostic-text">{rca.mlError}</div>
                                                </div>
                                            )}


                                        </div>

                                        <div>
                                            <div className="rca-title" style={{marginBottom: '2rem'}}>TECHNICAL EXECUTION TRACE</div>
                                            <div className="graph-container">
                                                {rca.frames.map((f, i) => {
                                                    const isRoot = i === rca.rc;
                                                    const isException = i === rca.frames.length - 1;
                                                    const isBoth = isRoot && isException;
                                                    return (
                                                        <div key={i} className={`graph-node ${isRoot ? 'root' : ''} ${isException ? 'exception' : ''}`}>
                                                            {/* Tags row — always inline at top to avoid absolute overlap */}
                                                            {(isRoot || isException) && (
                                                                <div style={{display:'flex', gap:'8px', marginBottom:'12px', flexWrap:'wrap'}}>
                                                                    {isRoot && (
                                                                        <div style={{fontSize:'9px', fontWeight:900, background:'var(--success)', color:'#000', padding:'3px 10px', borderRadius:'12px', letterSpacing:'0.05em'}}>
                                                                            ROOT CAUSE
                                                                        </div>
                                                                    )}
                                                                    {isException && (
                                                                        <div style={{fontSize:'9px', fontWeight:900, background:'var(--error)', color:'#fff', padding:'3px 10px', borderRadius:'12px', letterSpacing:'0.05em'}}>
                                                                            EXCEPTION
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                            <div style={{fontSize:'13px', fontWeight:700, color:'#f8fafc', marginBottom:'10px'}}>{f.func}() <span style={{fontWeight:500, color:'var(--text-dim)'}}>at Line {f.line}</span></div>
                                                            <div style={{fontSize:'12px', color:'#93c5fd', fontFamily:'JetBrains Mono, monospace', background:'rgba(0,0,0,0.4)', padding:'10px', borderRadius:'8px', border:'1px solid rgba(147, 197, 253, 0.1)'}}>{f.code.trim()}</div>
                                                            {i < rca.frames.length - 1 && (
                                                                <div className="graph-edge">
                                                                    <div className="graph-arrow"></div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                        <div className="terminal" style={{ height: `${termHeight}px` }}>
                            <div className="terminal-resizer" onMouseDown={startResize}></div>
                            <div className="terminal-header">
                                <div>SYSTEM CONSOLE & REPL</div>
                                <div style={{display:'flex', gap:'10px'}}>
                                    <button onClick={() => { if(termInstance.current) { termInstance.current.clear(); termInstance.current.write('\x1bcPYGLIDE SYSTEM CONSOLE\r\n>>> '); } }} style={{background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:'0.7rem', fontWeight:700}}>CLEAR</button>
                                </div>
                            </div>
                            <div id="xterm-container" ref={termRef}></div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
